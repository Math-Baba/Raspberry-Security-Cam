<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login • Surveillance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
      <div class="card p-6">
        <div class="flex items-center gap-3 mb-6">
          <div class="h-10 w-10 rounded-2xl bg-slate-800 grid place-items-center">
            <span class="text-lg">🔒</span>
          </div>
          <div>
            <h1 class="text-xl font-semibold">Connexion</h1>
            <p class="text-sm text-slate-400">Accès admin — Raspberry Pi Surveillance</p>
          </div>
        </div>

        <form id="loginForm" class="space-y-4">
          <div>
            <label class="label">Nom d’utilisateur</label>
            <input id="username" class="input" placeholder="admin" autocomplete="username" required />
          </div>

          <div>
            <label class="label">Code PIN (4 chiffres)</label>
            <input id="pin" class="input tracking-widest text-center text-lg"
                   inputmode="numeric" pattern="[0-9]{4}" maxlength="4"
                   placeholder="••••" autocomplete="current-password" required />
          </div>

          <button class="btn-primary w-full" type="submit">
            Se connecter
          </button>

          <div id="err" class="hidden text-sm text-red-300 bg-red-500/10 border border-red-500/20 rounded-xl p-3"></div>

          <p class="text-xs text-slate-500 mt-3">
            Astuce : PIN par défaut = <span class="font-mono">1234</span> (à changer après connexion).
          </p>
        </form>
      </div>

      <p class="text-xs text-slate-600 mt-4 text-center">
        © Surveillance UI • Local only
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const err = document.getElementById("err");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.classList.add("hidden");
      const username = document.getElementById("username").value.trim();
      const pin = document.getElementById("pin").value.trim();

      const res = await fetch("/api/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ username, pin })
      });

      const data = await res.json().catch(()=> ({}));
      if (!res.ok || !data.ok) {
        err.textContent = data.error || "Erreur de connexion.";
        err.classList.remove("hidden");
        return;
      }
      window.location.href = "/dashboard";
    });
  </script>
</body>
</html>
